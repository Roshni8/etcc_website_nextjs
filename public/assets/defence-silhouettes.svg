    <path d="M5,11 L0,16 L15,13Z"/>
    <path d="M170,2 L175,-5 L178,1Z"/>
    <path d="M170,14 L175,21 L178,15Z"/>
  </g>

  <!-- Another tank silhouette (center right, smaller) -->
  <g transform="translate(500, 300) scale(0.7) rotate(5)" opacity="0.3">
    <path d="M20,60 L40,30 L80,20 L100,15 L110,10 L180,10 L200,15 L210,25 L220,40 L230,50 L230,65 L220,75 L20,75 L10,70 L20,60Z"/>
