    <!-- Tracks -->
    <path d="M15,75 L10,85 L15,95 L30,100 L210,100 L225,95 L230,85 L225,75Z"/>
    <circle cx="30" cy="88" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
    <circle cx="60" cy="88" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
    <circle cx="90" cy="88" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
    <circle cx="120" cy="88" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
    <circle cx="150" cy="88" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
    <circle cx="180" cy="88" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
    <circle cx="210" cy="88" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
  </g>

  <!-- Naval Ship (bottom right) -->
  <g transform="translate(650, 380) scale(1.3)" opacity="0.45">
    <!-- Hull -->
    <path d="M0,50 L30,30 L50,25 L80,20 L120,18 L180,18 L220,20 L260,25 L300,35 L320,45 L330,55 L320,65 L10,65 L0,55Z"/>
