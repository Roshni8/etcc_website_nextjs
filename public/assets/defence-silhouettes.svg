<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="currentColor">
  <!-- Fighter Jet (top right) -->
  <g transform="translate(750, 80) scale(1.1)" opacity="0.6">
    <path d="M0,40 L30,35 L60,20 L90,15 L120,10 L150,8 L180,5 L200,3 L220,2 L240,2 L260,5 L270,15 L265,25 L250,30 L220,32 L200,34 L180,36 L170,50 L200,70 L210,85 L195,85 L170,70 L150,58 L130,50 L110,46 L90,44 L70,43 L50,42 L30,42 L10,42 L0,40Z"/>
    <path d="M100,20 L120,5 L140,0 L145,5 L130,15 L110,22Z"/>
    <path d="M60,42 L70,55 L90,65 L85,68 L60,60 L45,48Z"/>
  </g>

  <!-- Second Fighter Jet (top center) -->
  <g transform="translate(350, 50) scale(0.9) rotate(-5)" opacity="0.4">
    <path d="M0,40 L30,35 L60,20 L90,15 L120,10 L150,8 L180,5 L200,3 L220,2 L240,2 L260,5 L270,15 L265,25 L250,30 L220,32 L200,34 L180,36 L170,50 L200,70 L210,85 L195,85 L170,70 L150,58 L130,50 L110,46 L90,44 L70,43 L50,42 L30,42 L10,42 L0,40Z"/>
