    <path d="M100,18 L105,5 L120,0 L180,0 L200,5 L205,18Z"/>
    <!-- Bridge -->
    <path d="M130,0 L135,-15 L145,-20 L155,-20 L165,-15 L170,0Z"/>
    <!-- Mast -->
    <path d="M148,-20 L150,-45 L152,-20Z"/>
    <!-- Antenna -->
    <path d="M140,-40 L150,-45 L160,-40" fill="none" stroke="currentColor" stroke-width="2"/>
    <!-- Funnel -->
    <path d="M200,0 L205,-12 L215,-12 L220,0Z"/>
  </g>

  <!-- Missile (center) -->
  <g transform="translate(100, 220) rotate(-15) scale(1)" opacity="0.35">
    <path d="M0,8 L10,5 L30,3 L120,2 L150,1 L170,0 L180,2 L180,14 L170,16 L150,15 L120,14 L30,13 L10,11 L0,8Z"/>
