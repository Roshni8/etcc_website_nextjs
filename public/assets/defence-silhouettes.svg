    <path d="M60,42 L70,55 L90,65 L85,68 L60,60 L45,48Z"/>
  </g>

  <!-- Tank (bottom left) -->
  <g transform="translate(50, 350) scale(1.2)" opacity="0.5">
    <!-- Hull -->
    <path d="M20,60 L40,30 L80,20 L100,15 L110,10 L180,10 L200,15 L210,25 L220,40 L230,50 L230,65 L220,75 L20,75 L10,70 L20,60Z"/>
    <!-- Turret -->
