      <circle class="hole" cx="610" cy="260" r="9" /><circle class="hole" cx="650" cy="260" r="9" /><circle class="hole" cx="690" cy="260" r="9" /><circle class="hole" cx="730" cy="260" r="9" /><circle class="hole" cx="770" cy="260" r="9" /><circle class="hole" cx="810" cy="260" r="9" /><circle class="hole" cx="850" cy="260" r="9" />
