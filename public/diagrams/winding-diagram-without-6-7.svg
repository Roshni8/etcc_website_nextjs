<svg xmlns="http://www.w3.org/2000/svg" width="980" height="700" viewBox="0 0 980 700">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563" />
    </marker>
    <style>
      .wire { fill: none; stroke: #4b5563; stroke-width: 3; }
      .hole { fill: none; stroke: #6b7280; stroke-width: 2; }
      .core { fill: none; stroke: #374151; stroke-width: 2.5; }
      .label-circle { fill: white; stroke: #4b5563; stroke-width: 2.5; }
      .label-text { fill: #1f2937; font-family: Arial, sans-serif; font-size: 26px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .lead { fill: none; stroke: #4b5563; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="980" height="700" fill="white" />

  <!-- Core -->
  <rect class="core" x="280" y="190" width="300" height="300" />
  <g stroke="#6b7280" stroke-width="1.8">
    <line x1="300" y1="190" x2="300" y2="490" />
    <line x1="320" y1="190" x2="320" y2="490" />
    <line x1="340" y1="190" x2="340" y2="490" />
    <line x1="360" y1="190" x2="360" y2="490" />
    <line x1="380" y1="190" x2="380" y2="490" />
    <line x1="400" y1="190" x2="400" y2="490" />
    <line x1="420" y1="190" x2="420" y2="490" />
    <line x1="440" y1="190" x2="440" y2="490" />
    <line x1="460" y1="190" x2="460" y2="490" />
    <line x1="480" y1="190" x2="480" y2="490" />
    <line x1="500" y1="190" x2="500" y2="490" />
    <line x1="520" y1="190" x2="520" y2="490" />
    <line x1="540" y1="190" x2="540" y2="490" />
    <line x1="560" y1="190" x2="560" y2="490" />
  </g>

  <!-- Winding turns (right and bottom orientation) -->
  <path class="wire" d="M 580 230 H 870 V 560 H 560" />
  <path class="wire" d="M 580 260 H 840 V 530 H 560" />
  <path class="wire" d="M 580 290 H 810 V 500 H 560" />
  <path class="wire" d="M 580 320 H 780 V 470 H 560" />
  <path class="wire" d="M 580 350 H 750 V 440 H 560" />
  <path class="wire" d="M 580 380 H 720 V 410 H 560" />

