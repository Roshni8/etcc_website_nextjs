      <circle class="hole" cx="810" cy="330" r="9" /><circle class="hole" cx="810" cy="370" r="9" /><circle class="hole" cx="810" cy="410" r="9" /><circle class="hole" cx="810" cy="450" r="9" /><circle class="hole" cx="810" cy="490" r="9" /><circle class="hole" cx="810" cy="530" r="9" />
      <circle class="hole" cx="780" cy="360" r="9" /><circle class="hole" cx="780" cy="400" r="9" /><circle class="hole" cx="780" cy="440" r="9" /><circle class="hole" cx="780" cy="480" r="9" /><circle class="hole" cx="780" cy="520" r="9" />
      <circle class="hole" cx="750" cy="390" r="9" /><circle class="hole" cx="750" cy="430" r="9" /><circle class="hole" cx="750" cy="470" r="9" /><circle class="hole" cx="750" cy="510" r="9" />
      <circle class="hole" cx="720" cy="420" r="9" /><circle class="hole" cx="720" cy="460" r="9" /><circle class="hole" cx="720" cy="500" r="9" />
      <circle class="hole" cx="690" cy="560" r="9" /><circle class="hole" cx="650" cy="560" r="9" /><circle class="hole" cx="610" cy="560" r="9" />
      <circle class="hole" cx="690" cy="530" r="9" /><circle class="hole" cx="650" cy="530" r="9" /><circle class="hole" cx="610" cy="530" r="9" />
      <circle class="hole" cx="690" cy="500" r="9" /><circle class="hole" cx="650" cy="500" r="9" /><circle class="hole" cx="610" cy="500" r="9" />
      <circle class="hole" cx="690" cy="470" r="9" /><circle class="hole" cx="650" cy="470" r="9" /><circle class="hole" cx="610" cy="470" r="9" />
