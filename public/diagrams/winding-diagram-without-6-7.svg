    <circle class="label-circle" cx="212" cy="500" r="24" /><text class="label-text" x="212" y="500">5</text>
    <circle class="label-circle" cx="224" cy="290" r="24" /><text class="label-text" x="224" y="290">4</text>
    <circle class="label-circle" cx="142" cy="560" r="24" /><text class="label-text" x="142" y="560">8</text>
    <circle class="label-circle" cx="206" cy="530" r="24" /><text class="label-text" x="206" y="530">9</text>
    <circle class="label-circle" cx="274" cy="230" r="24" /><text class="label-text" x="274" y="230">10</text>
